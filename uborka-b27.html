    const modal = document.createElement("div");
    modal.className = "fixed inset-0 bg-black bg-opacity-60 bs-wrap flex items-start justify-center z-50 overflow-auto p-4";
    modal.innerHTML = `
    <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-md mt-8 mb-8 bs-card">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-bold text-gray-800">🔄 Синхронизация между устройствами</h3>
            <button id="closeSyncM" class="text-gray-300 text-2xl leading-none">×</button>
        </div>

        ${cfg.url
            ? `<div class="bg-green-50 border border-green-200 rounded-xl p-3 mb-4 flex items-center gap-3">
                <span class="text-2xl">✅</span>
                <div class="flex-1">
                    <p class="text-green-700 font-bold text-sm">Синхронизация активна</p>
                    <p class="text-green-600 text-xs mt-0.5">Код семьи: <strong>${familyCode}</strong></p>
                </div>
                <button id="disableSyncBtn" class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded-lg shrink-0">Отключить</button>
            </div>`
            : `<div class="bg-amber-50 border border-amber-200 rounded-xl p-3 mb-4">
                <p class="text-amber-800 font-bold text-sm">⚠️ Синхронизация не настроена</p>
                <p class="text-amber-600 text-xs mt-0.5">Данные хранятся только на этом устройстве</p>
            </div>`}

        <div class="bg-blue-50 rounded-xl p-4 mb-4">
            <p class="text-blue-800 font-semibold text-sm mb-2">Как настроить (5 минут, бесплатно):</p>
            <ol class="text-xs text-blue-700 space-y-1 list-decimal list-inside leading-relaxed">
                <li>Открой <strong>console.firebase.google.com</strong></li>
                <li>Войди через Google → «Создать проект» (бесплатно)</li>
                <li>В левом меню: <strong>Realtime Database → Создать</strong></li>
                <li>Выбери регион, нажми <strong>«Тестовый режим»</strong></li>
                <li>Скопируй URL базы (вида <code>https://xxx-rtdb.firebaseio.com</code>)</li>
                <li>Вставь ниже и нажми «Сохранить»</li>
            </ol>
        </div>

        <div class="mb-4">
            <label class="text-sm font-semibold text-gray-700 mb-1 block">Firebase Database URL</label>
            <input id="syncUrlInput" type="url"
                value="${cfg.url ? cfg.url.replace('/b27-'+familyCode+'.json','') : ''}"
                placeholder="https://my-project-default-rtdb.firebaseio.com"
                class="w-full border rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
            <p class="text-xs text-gray-400 mt-1">Код семьи: <strong>${familyCode}</strong> — используют все устройства одной семьи</p>
        </div>

        <div class="flex gap-3">
            <button id="saveSyncBtn" class="flex-1 bg-amber-600 hover:bg-amber-700 text-white py-3 rounded-xl font-bold">💾 Сохранить</button>
            <button id="syncNowBtn" class="bg-sky-100 text-sky-700 px-4 py-3 rounded-xl font-bold text-sm">⬇ Получить сейчас</button>
        </div>
    </div>`;
    document.body.appendChild(modal);

    modal.querySelector("#saveSyncBtn").onclick = () => {
        const raw = modal.querySelector("#syncUrlInput").value.trim().replace(/\/+$/, "");
        if (!raw) { showToast("Введи URL базы данных"); return; }
        const syncUrl = raw + "/b27-" + familyCode + ".json";
        saveSyncConfig({ url: syncUrl, familyCode });
        modal.remove();
        startSyncPolling();
        syncPush({ ...state, selectedSprintTaskIds: Array.from(state.selectedSprintTaskIds), _ts: state._ts });
        showToast("✅ Синхронизация включена!");
        render();
    };
    if (modal.querySelector("#disableSyncBtn")) {
        modal.querySelector("#disableSyncBtn").onclick = () => {
            saveSyncConfig({ familyCode });
            if (_syncTimer) { clearInterval(_syncTimer); _syncTimer = null; }
            modal.remove();
            render();
        };
    }
    modal.querySelector("#syncNowBtn").onclick = () => { syncPull(false); modal.remove(); };
    modal.querySelector("#closeSyncM").onclick  = () => modal.remove();
    modal.addEventListener("click", e => { if (e.target === modal) modal.remove(); });
}

// ─────────────────── ➕ БЫСТРОЕ ДОБАВЛЕНИЕ В СПРИНТ ───────────────────
function showQuickAddToSprintModal(user, sprint) {
    const modal = document.createElement("div");
    modal.className = "fixed inset-0 bg-black bg-opacity-60 bs-wrap flex items-center justify-center z-50 p-4";
    modal.innerHTML = `
    <div class="bg-white rounded-3xl shadow-2xl p-6 w-full max-w-sm bs-card">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h3 class="text-lg font-black text-gray-800">➕ Добавить задачу</h3>
                <p class="text-xs text-gray-400">${user} · ${sprint==="sat" ? "📅 Суббота" : "📅 Воскресенье"}</p>
            </div>
            <button id="closeQA" class="text-gray-300 hover:text-gray-500 text-2xl leading-none">×</button>
        </div>
        <div class="space-y-3 mb-5">
            <div>
                <label class="text-xs font-semibold text-gray-600 mb-1 block">Название *</label>
                <input id="qaName" type="text" placeholder="Что нужно сделать?" autocomplete="off"
                    class="w-full border rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
            </div>
            <div class="flex gap-3">
                <div class="flex-1">
                    <label class="text-xs font-semibold text-gray-600 mb-1 block">Время (мин)</label>
                    <input id="qaTime" type="number" value="15" min="1" max="180"
                        class="w-full border rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
                </div>
                <div class="flex-1">
                    <label class="text-xs font-semibold text-gray-600 mb-1 block">День</label>
                    <select id="qaSprint" class="w-full border rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
                        <option value="sat" ${sprint==="sat"?"selected":""}>Суббота</option>
                        <option value="sun" ${sprint==="sun"?"selected":""}>Воскресенье</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="flex gap-3">
            <button id="confirmQA" class="flex-1 bg-amber-600 hover:bg-amber-700 text-white py-3 rounded-xl font-bold">➕ Добавить</button>
            <button id="cancelQA"  class="flex-1 bg-gray-100 text-gray-700 py-3 rounded-xl">Отмена</button>
        </div>
    </div>`;
    document.body.appendChild(modal);
    const nameInput = modal.querySelector("#qaName");
    setTimeout(() => nameInput.focus(), 80);

    const confirm = () => {
        const name = nameInput.value.trim();
        if (!name) { nameInput.classList.add("ring-2","ring-red-400"); nameInput.focus(); return; }
        const time   = Math.max(1, parseInt(modal.querySelector("#qaTime").value) || 15);
        const sprint = modal.querySelector("#qaSprint").value;
        state.tasks.push({
            id: "qa_" + Date.now(), name, time, sprint,
            assignee: user, done: false, inProgress: false,
            category: "Своё", prefs: {}, type: "custom", isCustom: true,
        });
        saveState(); render(); modal.remove();
        showToast(`✅ Добавлено для ${user}`);
    };
    modal.querySelector("#confirmQA").onclick = confirm;
    nameInput.addEventListener("keydown", e => { if (e.key === "Enter") confirm(); });
    modal.querySelector("#cancelQA").onclick = () => modal.remove();
    modal.querySelector("#closeQA").onclick  = () => modal.remove();
    modal.addEventListener("click", e => { if (e.target === modal) modal.remove(); });
}

// ─────────────────── ⇒ ПЕРЕДАТЬ ПОДЗАДАЧУ КАК ЗАДАЧУ ───────────────────
function showSubtaskTransferModal(taskId, subId) {
    const task = state.tasks.find(t => t.id === taskId);
    if (!task) return;
    const sub = (task.customSubtasks || []).find(s => s.id === subId);
    if (!sub) return;

    const modal = document.createElement("div");
    modal.className = "fixed inset-0 bg-black bg-opacity-60 bs-wrap flex items-center justify-center z-50 p-4";
    modal.innerHTML = `
    <div class="bg-white rounded-3xl shadow-2xl p-6 w-full max-w-sm bs-card">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-lg font-black text-gray-800">⇒ Передать подзадачу</h3>
            <button id="closeTransfer" class="text-gray-300 text-2xl leading-none">×</button>
        </div>
        <p class="text-xs text-gray-500 mb-1 uppercase tracking-wide font-semibold">Подзадача</p>
        <div class="bg-gray-50 rounded-xl px-4 py-3 mb-4">
            <p class="font-bold text-gray-800 text-sm">«${sub.name}»</p>
            <p class="text-xs text-gray-400 mt-0.5">из задачи «${task.name}»</p>
        </div>
        <p class="text-sm text-gray-600 mb-3">Кому назначить как новую задачу?</p>
        <div class="space-y-2 mb-5">
            ${MEMBERS.map(m => `
            <label class="flex items-center gap-3 p-3 border-2 border-gray-100 rounded-xl hover:border-amber-300 cursor-pointer transition-all has-[:checked]:border-amber-400 has-[:checked]:bg-amber-50">
                <input type="radio" name="transferTo" value="${m}" class="w-4 h-4 accent-amber-500">
                <span class="font-medium text-sm">${m}</span>
            </label>`).join("")}
        </div>
        <div class="flex gap-3">
            <button id="confirmTransfer" class="flex-1 bg-amber-600 hover:bg-amber-700 text-white py-3 rounded-xl font-bold">⇒ Передать</button>
            <button id="cancelTransfer"  class="flex-1 bg-gray-100 text-gray-700 py-3 rounded-xl">Отмена</button>
        </div>
    </div>`;
    document.body.appendChild(modal);

    modal.querySelector("#confirmTransfer").onclick = () => {
        const target = modal.querySelector("input[name=transferTo]:checked")?.value;
        if (!target) { showToast("Выбери участника"); return; }
        state.tasks.push({
            id: "tr_" + Date.now(), name: sub.name, time: 10,
            sprint: task.sprint || "sat", assignee: target,
            done: false, inProgress: false,
            category: task.category || "Своё", prefs: {},
            type: "custom", isCustom: true, parentName: task.name,
        });
        task.customSubtasks = (task.customSubtasks || []).filter(s => s.id !== subId);
        saveState(); render(); modal.remove();
        showToast(`⇒ Задача добавлена ${target}`);
    };
    modal.querySelector("#cancelTransfer").onclick  = () => modal.remove();
    modal.querySelector("#closeTransfer").onclick   = () => modal.remove();
    modal.addEventListener("click", e => { if (e.target === modal) modal.remove(); });
}

// ─────────────────── НИЖНИЙ ТАББАР (мобайл) ───────────────────
function renderBottomNav(current) {
    const tabs = [
        { key:"Миша",          icon:"👦", label:"Миша"   },
        { key:"Максим",        icon:"🧑", label:"Максим" },
        { key:"Майя",          icon:"👧", label:"Майя"   },
        { key:"Мама",          icon:"👩", label:"Мама"   },
        { key:"Администратор", icon:"🔧", label:"Адм."   },
    ];
    return tabs.map(t => {
        const active = t.key === current;
        const col = active ? "#b45309" : "#9ca3af";
        return `
        <button class="navTab flex-1 flex flex-col items-center justify-center gap-0.5 py-2" style="color:${col};background:none;border:none" data-user="${t.key}">
            <span style="font-size:1.4rem;line-height:1.2">${t.icon}</span>
            <span style="font-size:.6rem;font-weight:${active?700:500}">${t.label}</span>
            <span style="width:${active?18:0}px;height:2px;background:#d97706;border-radius:2px;transition:width .15s"></span>
        </button>`;
    }).join("");
}

// ─────────────────── ГЛАВНЫЙ РЕНДЕР ───────────────────
function render() {
    const app = document.getElementById("app");
    if (state.stage === "sprint_selection") {
        if (state.currentUser === "Администратор") {
            app.innerHTML = renderAdminSelection();
        } else {
            app.innerHTML = renderWaitingScreen();
        }
    } else {
        app.innerHTML = renderExecution();
    }

    // Нижний таббар (мобайл)
    let nav = document.getElementById("bottomNav");
    if (!nav) {
        nav = document.createElement("div");
        nav.id = "bottomNav";
        document.body.appendChild(nav);
    }
    nav.innerHTML = renderBottomNav(state.currentUser);
    nav.querySelectorAll(".navTab").forEach(btn => {
        btn.onclick = () => {
            const u = btn.dataset.user;
            state.currentUser = u;
            // Если участник выбран, а спринт уже запущен — перейти в режим выполнения
            if (u !== "Администратор" && state.stage === "sprint_selection" && state.tasks.length > 0) {
                state.stage = "execution";
            }
            saveState(); render();
        };
    });

    attachEvents();
    if (!_syncTimer && getSyncUrl()) startSyncPolling();
}

loadState();
// Авто-пресет «Обычный» если ещё ничего не выбрано
if (state.selectedSprintTaskIds.size === 0) {
    const _biIds = currentBiweeklyIds();
    state.selectedSprintTaskIds = new Set(
        state.allTasksPool.filter(t => {
            if (t.freq === "monthly")  return false;
            if (t.freq === "biweekly") return _biIds.includes(t.id);
            return true;
        }).map(t => t.id)
    );
}
render();

// Service Worker (PWA — работа офлайн)
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
}
</script>
