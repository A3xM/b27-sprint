            0%   { transform: scale(0); opacity: 0; }

            100% { transform: scale(1); opacity: 0; }
        }
        .confetti-piece {
            position: fixed; width: 8px; height: 8px;
            animation: confetti 2s ease-out forwards;
            pointer-events: none; z-index: 1000;
        }
        .breathing-circle { transition: transform 1s ease-in-out; }
        .breathing-circle.active { transform: scale(1.3); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 10px; }

        /* ─── Мобильная адаптация ─── */
        html { -webkit-text-size-adjust: 100%; }
        button { touch-action: manipulation; }

        /* Пространство под нижний таббар */

        @media (min-width: 640px) { #app { padding-bottom: 1.5rem; } }

        /* Нижний таббар */
        #bottomNav {
            display: flex;
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #fff; border-top: 1px solid #e5e7eb;
            box-shadow: 0 -2px 16px rgba(0,0,0,.07);
            z-index: 40;
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }
        @media (min-width: 640px) { #bottomNav { display: none; } }

        @media (max-width: 639px) {
            .bs-wrap { align-items: flex-end !important; padding: 0 !important; }
            .bs-card {
                border-top-left-radius: 1.5rem !important;
                border-top-right-radius: 1.5rem !important;
                border-bottom-left-radius: 0 !important;
                border-bottom-right-radius: 0 !important;

        @keyframes in-progress-pulse {

    if (ELEPHANT_STEPS[task.id]) return ELEPHANT_STEPS[task.id].map(s => ({...s}));
    // Генерация для кастомных/неизвестных задач по времени
    const t = task.time || 15;
    if (t <= 10) return [
        {name:"Подготовить всё необходимое",                        time:2},
        {name:"Выполнить основное действие",                        time:Math.max(t-4,3)},
        {name:"Проверить результат и убрать за собой",              time:2},

    const chunk = Math.max(Math.round(t / 4), 3);
    return [
        {name:"Подготовить инструменты и пространство",             time:Math.min(chunk,5)},
        {name:"Выполнить первую половину задачи",                   time:chunk},

        {name:"Завершить вторую половину",                          time:chunk},
        {name:"Проверить и прибраться за собой",                    time:Math.min(chunk,5)},
    ];
}

// ─────────────────── 🔄 СИНХРОНИЗАЦИЯ (Firebase REST) ───────────────────
const SYNC_CFG_KEY = "b27_sync_cfg";

function getSyncConfig()    { try { return JSON.parse(localStorage.getItem(SYNC_CFG_KEY)) || {}; } catch { return {}; } }
function saveSyncConfig(c)  { localStorage.setItem(SYNC_CFG_KEY, JSON.stringify(c)); }
function getSyncUrl()       { return getSyncConfig().url || null; }
function getSyncStatus()    { return !!getSyncUrl(); }

let _syncTimer = null;

function syncPush(payload) {
    const url = getSyncUrl();
    if (!url) return;
    fetch(url, { method:"PUT", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload) })
        .catch(() => {});
}

async function syncPull(silent) {
    const url = getSyncUrl();
    if (!url) return;
    try {
        const r = await fetch(url + "?_=" + Date.now());
        if (!r.ok) return;
        const data = await r.json();
        if (!data || typeof data._ts !== "number") return;
        if (data._ts <= (state._ts || 0)) return; // данные не новее
        // Применяем обновления
        Object.assign(state, data);
        state.selectedSprintTaskIds = new Set(data.selectedSprintTaskIds || []);
        state.allTasksPool = JSON.parse(JSON.stringify(FULL_TASKS_DB));
        if (state.customTasks?.length)
            state.allTasksPool = [...state.allTasksPool, ...JSON.parse(JSON.stringify(state.customTasks))];
        if (!state.frogTaskIds) state.frogTaskIds = {};
        if (!state.taskOrder)   state.taskOrder   = {};
        localStorage.setItem("b27_v2", JSON.stringify(data));
        render();
        if (!silent) showToast("🔄 Данные обновлены!");
    } catch {}
}

function startSyncPolling() {
    if (_syncTimer) clearInterval(_syncTimer);
    if (!getSyncUrl()) return;
    syncPull(true);  // тихое обновление при старте
    _syncTimer = setInterval(() => syncPull(true), 15000); // каждые 15 сек
}

// Обновление при возврате на вкладку
document.addEventListener("visibilitychange", () => {
    if (!document.hidden && getSyncUrl()) syncPull(true);
});

// ─────────────────── УМНЫЙ АЛГОРИТМ РАСПРЕДЕЛЕНИЯ ───────────────────
// Логика по типам:
//   personal   → копия каждому участнику из `who`
//   adhd       → назначается из `who` по наивысшему предпочтению (обычно Миша)
//   mom_primary→ всегда Маме + авто-подзадача помощнику (helper)
//   shared     → балансировка среди `who` по равным средним

function assignBalanced(tasks) {
    const result  = [];   // итоговые task-объекты со sprint/assignee

    // 1. PERSONAL — копия каждому
    tasks.filter(t => t.type === "personal").forEach(t => {
        const sp = t.defaultSprint || "sat";
        (t.who || MEMBERS).forEach(m => {
            result.push({ ...t, id: t.id+"_"+m, assignee: m, done:false, sprint:sp, isPersonal:true });
        });
    });

    // 2. ADHD — назначаем первому из who с наивысшим предпочтением
    tasks.filter(t => t.type === "adhd").forEach(t => {
        const who  = t.who || ["Миша"];
        const best = who.reduce((a,b) => (t.prefs[a]||1) >= (t.prefs[b]||1) ? a : b);
        result.push({ ...t, assignee: best, done:false, sprint: t.defaultSprint || "sat" });
    });

    // 3. MOM_PRIMARY — Маме + подзадача помощнику
    tasks.filter(t => t.type === "mom_primary").forEach(t => {
        const sp = t.defaultSprint || "sat";
        result.push({ ...t, assignee:"Мама", done:false, sprint:sp });
        if (t.helper) {
            result.push({
                ...t,
                id: t.id+"_helper",
                name: t.helper.name,
                time: t.helper.time,
                assignee: t.helper.who,
                done: false, sprint: t.helper.defaultSprint || sp,
                isHelper: true, optional: t.helper.optional || false,
                adhdFriendly: t.helper.adhdFriendly || false,
                parentName: t.name,
            });
        }
    });

    // 4. SHARED — балансировка среди who
    const sharedTasks = tasks.filter(t => t.type === "shared");

    // Группируем по наборам who и балансируем внутри каждой группы
    // Упрощение: единый жадный алгоритм по всем shared, но только среди eligible
    const counts = Object.fromEntries(MEMBERS.map(m => [m, 0]));
    const sums   = Object.fromEntries(MEMBERS.map(m => [m, 0]));

    // Сортируем: сначала задачи с явным лидером (большой разрыв между лучшим и вторым)
    const sorted = [...sharedTasks].sort((a,b) => {
        const advantage = t => {
            const vals = (t.who||MEMBERS).map(m => t.prefs[m]||1).sort((x,y)=>y-x);
            return (vals[0]||1) - (vals[1]||1);
        };
        return advantage(b) - advantage(a);
    });

    sorted.forEach(t => {
        const eligible = t.who || MEMBERS;
        // Выбираем: наивысшее предпочтение + штраф за тех, у кого уже много задач
        let best = null, bestScore = -Infinity;
        eligible.forEach(m => {
            const pref    = t.prefs[m] || 1;
            const penalty = counts[m] * 0.3;
            const curAvg  = counts[m] > 0 ? sums[m]/counts[m] : 5;
            const gap     = Math.max(0, 4 - curAvg); // тянем отстающих вверх
            const score   = pref - penalty + gap * 0.4;
            if (score > bestScore) { bestScore = score; best = m; }
        });
        if (!best) best = eligible[0];
        counts[best]++;
        sums[best] += (t.prefs[best]||1);
        const sp = t.defaultSprint || "sat";
        result.push({ ...t, assignee: best, done:false, sprint: sp });

        // Авто-подзадача для Миши если есть
        if (t.subtask) {
            result.push({
                ...t,
                id: t.id+"_sub",
                name: t.subtask.name,
                time: t.subtask.time,
                assignee: t.subtask.who,
                adhdFriendly: t.subtask.adhdFriendly || false,
                done: false, sprint: t.subtask.defaultSprint || sp,
                isMishaSubtask: true,
                parentName: t.name,
            });
        }
    });

    return result;
}


// Статистика распределения
function calcStats(tasks) {
    const stats = {};
    MEMBERS.forEach(m => { stats[m] = { count:0, sum:0, avg:0, tasks:[] }; });
    tasks.forEach(t => {
        const m = t.assignee;
        if (!stats[m]) return;
        stats[m].count++;
        stats[m].sum += (t.prefs[m] || 1);
        stats[m].tasks.push(t);
    });
    MEMBERS.forEach(m => {
        stats[m].avg = stats[m].count ? +(stats[m].sum / stats[m].count).toFixed(2) : 0;
    });
    return stats;
}

            Object.assign(state, d);

    if (state.customTasks && state.customTasks.length) {

        const prefsBar   = (t.who || MEMBERS).map(m =>
            `<span class="inline-flex flex-col items-center" title="${m}: ${t.prefs[m]||1}">
                <span style="width:16px;height:${(t.prefs[m]||1)*2}px;background:${prefColor(t.prefs[m]||1)};border-radius:2px;display:block;"></span>
                <span class="text-gray-400 text-xs">${m[0]}</span>
             </span>`
        ).join("");
        const deleteBtn = t.isCustom
            ? `<button class="deleteCustomTask shrink-0 text-red-300 hover:text-red-500 text-sm px-1" data-id="${t.id}" title="Удалить задачу">🗑</button>`
            : "";
        return `
        <label class="flex items-center gap-3 border-b last:border-0 p-2 hover:bg-gray-50 cursor-pointer">
            <input type="checkbox" class="task-checkbox w-4 h-4 shrink-0" data-id="${t.id}" ${chk}>
            <div class="flex-1 min-w-0">
                <span class="text-sm">${t.name}</span>
                ${subNote}${helperNote}${noteTag}${customTag}
                <span class="block text-xs text-gray-400">→ ${who}</span>
            </div>
            <span class="text-xs text-gray-400 whitespace-nowrap">⏱ ${t.time} мин</span>
            <div class="flex gap-0.5 items-end shrink-0">${prefsBar}</div>
            ${deleteBtn}
        </label>`;
    }

    let taskRows = "";
    ["personal","adhd","mom_primary","shared"].forEach(type => {
        const meta  = TYPE_META[type];
        const group = pool.filter(t => t.type === type && !t.isCustom);
        if (!group.length) return;

        taskRows += `<div class="mt-4 border rounded-xl overflow-hidden">
            <div class="px-3 py-2 font-semibold text-sm ${meta.color} border-b">${meta.label}</div>`;
        group.forEach(t => { taskRows += taskSelRow(t); });
        taskRows += `</div>`;
    });

    // Блок пользовательских задач
    const customGroup = pool.filter(t => t.isCustom);
    if (customGroup.length) {
        const meta = TYPE_META.custom;
        taskRows += `<div class="mt-4 border-2 border-orange-200 rounded-xl overflow-hidden">
            <div class="px-3 py-2 font-semibold text-sm ${meta.color} border-b">${meta.label}</div>`;
        customGroup.forEach(t => { taskRows += taskSelRow(t); });
        taskRows += `</div>`;
    }

    const hasActiveSprint = state.tasks.length > 0;

    return `
    <div class="space-y-4">
        <div class="bg-red-50 border border-red-200 rounded-2xl shadow-lg p-4">
            <div class="flex flex-wrap justify-between items-center gap-3 mb-3">
                <div>
                    <h2 class="text-xl font-bold text-red-800">🔧 Администратор</h2>
                    <p class="text-sm text-red-600">Подзадачи Миши и помощники добавляются автоматически</p>
                </div>
                ${renderUserSwitcher("Администратор")}
            </div>
            <div class="flex gap-2 flex-wrap">
                <span class="flex-1 text-center bg-red-600 text-white font-bold px-4 py-2 rounded-xl text-sm">📋 Задачи спринта</span>
                ${hasActiveSprint
                    ? `<button id="goProgress" class="flex-1 bg-white border border-red-200 text-red-700 hover:bg-red-50 font-bold px-4 py-2 rounded-xl text-sm">👥 Прогресс семьи</button>`
                    : `<span class="flex-1 text-center bg-white border border-red-100 text-red-300 font-bold px-4 py-2 rounded-xl text-sm">👥 Прогресс семьи</span>`}
                <button id="openSyncModal" class="bg-white border border-red-200 text-red-600 hover:bg-red-50 px-3 py-2 rounded-xl text-sm font-medium" title="Синхронизация между устройствами">${getSyncStatus() ? "🔄✅" : "🔄"} Синхр.</button>
                ${state.pendingReward ? `<button id="showPendingRewardBtn" class="bg-amber-400 text-white px-3 py-2 rounded-xl text-sm font-bold animate-pulse" title="Есть предложение награды">💡 Награда</button>` : ""}
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-lg p-5">
            <div class="flex flex-wrap justify-between items-center gap-3 mb-4">
                <div>
                    <h2 class="text-xl font-bold text-amber-800">Выбор задач</h2>
                    <p class="text-sm text-gray-500">Выбери пресет или отметь задачи вручную</p>
                </div>
                <div class="flex gap-2 flex-wrap">
                    <button id="presetEasy"   class="px-3 py-1.5 rounded-xl text-sm font-medium text-left leading-tight border-2 transition-all ${activePreset==="easy"   ? "bg-blue-500  text-white  border-blue-500"  : "bg-blue-50  text-blue-700  border-blue-200  hover:border-blue-400"}">☀️ Лёгкий<span class="block text-xs font-normal opacity-80">${easySet.size} задач</span></button>
                    <button id="presetNormal" class="px-3 py-1.5 rounded-xl text-sm font-medium text-left leading-tight border-2 transition-all ${activePreset==="normal" ? "bg-green-500 text-white  border-green-500" : "bg-green-50 text-green-700 border-green-200 hover:border-green-400"}">🧹 Обычный<span class="block text-xs font-normal opacity-80">${normalSet.size} задач · ${biweeklyLabel()}</span></button>
                    <button id="presetFull"   class="px-3 py-1.5 rounded-xl text-sm font-medium text-left leading-tight border-2 transition-all ${activePreset==="full"   ? "bg-red-500   text-white  border-red-500"   : "bg-red-50   text-red-700   border-red-200   hover:border-red-400"}">💪 Генеральная<span class="block text-xs font-normal opacity-80">${fullSet.size} задач</span></button>
                    ${activePreset==="custom" ? `<span class="px-3 py-1.5 rounded-xl text-sm font-medium bg-amber-100 text-amber-700 border-2 border-amber-400 leading-tight">✏️ Свой выбор<span class="block text-xs font-normal opacity-80">${selCount} задач</span></span>` : ""}
                    <button id="addCustomTaskBtn" class="px-3 py-1.5 rounded-xl text-sm font-medium border-2 border-dashed border-orange-300 text-orange-600 hover:bg-orange-50 leading-tight">➕ Добавить<span class="block text-xs font-normal opacity-80">свою задачу</span></button>
                </div>
            </div>
            <div>${taskRows}</div>
            <div class="flex items-center justify-between mt-4 flex-wrap gap-3">
                <p class="text-gray-600">Выбрано: <strong>${selCount}</strong> из ${pool.length}</p>
                <button id="distributeBtn" class="bg-amber-600 hover:bg-amber-700 text-white px-6 py-2 rounded-xl font-semibold shadow ${selCount===0?'opacity-40 cursor-not-allowed':''}" ${selCount===0?'disabled':''}>
                    Распределить и начать →
                </button>
            </div>
        </div>
    </div>`;
}

function prefColor(v) {
    if (v >= 8) return "#10b981";
    if (v >= 5) return "#f59e0b";
    if (v >= 3) return "#f97316";
    return "#ef4444";
}

// ─────────────────── РЕНДЕР: статистика распределения ───────────────────
function renderStats(tasks) {
    const stats = calcStats(tasks);
    const colors = { Миша:"blue", Максим:"purple", Майя:"pink", Мама:"amber" };
    let html = `<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">`;
    MEMBERS.forEach(m => {
        const s = stats[m];
        const c = colors[m];
        html += `
        <div class="bg-${c}-50 border border-${c}-200 rounded-xl p-3 text-center">
            <p class="font-bold text-${c}-800">${m}</p>
            <p class="text-2xl font-bold text-${c}-600">${s.avg}</p>
            <p class="text-xs text-gray-500">среднее предпочтение</p>
            <p class="text-xs text-gray-400">${s.count} задач</p>
        </div>`;
    });
    html += `</div>`;
    return html;
}

// ─────────────────── ПЕРЕКЛЮЧАТЕЛЬ ПОЛЬЗОВАТЕЛЯ (общий) ───────────────────
function renderUserSwitcher(current) {
    const opts = [...MEMBERS, "Администратор"];
    return `<select id="userSwitcher" class="hidden sm:inline-block border rounded-lg px-2 py-1.5 text-sm tap44">
        ${opts.map(m => `<option ${m===current?"selected":""}>${m}</option>`).join("")}
    </select>`;
}

// ─────────────────── ВИД АДМИНИСТРАТОРА ───────────────────
function renderAdminView() {
    const famDone  = state.tasks.filter(t=>t.done).length;
    const famTotal = state.tasks.length;
    const famPct   = famTotal ? Math.round(famDone/famTotal*100) : 0;
    const stats    = calcStats(state.tasks);

    const memberColors = { Миша:"blue", Максим:"purple", Майя:"pink", Мама:"amber" };

    let memberSections = MEMBERS.map(m => {
        const mTasks   = state.tasks.filter(t => t.assignee === m);
        const pending  = mTasks.filter(t => !t.done);
        const done     = mTasks.filter(t => t.done);
        const c        = memberColors[m] || "gray";
        const mPct     = mTasks.length ? Math.round(done.length/mTasks.length*100) : 0;

        const taskCards = pending.map(t => `
            <div class="flex items-center gap-2 border-b py-2 group">
                <span class="flex-1 text-sm">${t.name}</span>
                <span class="text-xs text-gray-400 whitespace-nowrap">⏱ ${t.time} мин</span>
                <span class="text-xs px-1 rounded" style="background:${prefColor(t.prefs[m]||1)}22;color:${prefColor(t.prefs[m]||1)}">
                    ${t.prefs[m]||1}/10
                </span>
                <button class="reassignBtn text-xs bg-orange-100 text-orange-700 px-2 py-1 rounded-lg" data-id="${t.id}">↪ Передать</button>
                <button class="deleteFromSprintBtn text-xs text-red-300 hover:text-red-500 px-1 py-1 rounded" data-id="${t.id}" title="Удалить из спринта">🗑</button>
            </div>`).join("");

        const doneCards = done.map(t => `
            <div class="flex items-center gap-2 border-b py-1 group">
                <span class="flex-1 text-xs line-through text-gray-400">${t.name}</span>
                <span class="text-xs text-gray-300">⏱ ${t.time} мин</span>
                <button class="undoBtn text-xs bg-yellow-100 text-yellow-700 px-2 py-1 rounded-lg" data-id="${t.id}">↩ Вернуть</button>
                <button class="deleteFromSprintBtn text-xs text-red-300 hover:text-red-500 px-1 py-1 rounded" data-id="${t.id}" title="Удалить из спринта">🗑</button>
            </div>`).join("");

        return `
        <div class="bg-white rounded-2xl shadow-sm p-4">
            <div class="flex items-center justify-between mb-2">
                <div>
                    <span class="font-bold text-${c}-700">${m}</span>
                    <span class="text-xs text-gray-400 ml-2">${mTasks.length} задач · ср. предпочтение ${stats[m].avg}</span>
                </div>
                <span class="text-sm font-semibold text-${c}-600">${mPct}%</span>
            </div>
            <div class="w-full bg-gray-100 rounded-full h-1.5 mb-3">
                <div class="bg-${c}-400 h-1.5 rounded-full" style="width:${mPct}%"></div>
            </div>
            ${taskCards || `<p class="text-xs text-gray-400">Все задачи выполнены</p>`}
            ${done.length ? `<details class="mt-2"><summary class="text-xs text-gray-400 cursor-pointer">✅ Выполнено (${done.length})</summary>${doneCards}</details>` : ""}
        </div>`;
    }).join("");

    return `
    <div class="space-y-4">
        <div class="bg-red-50 border border-red-200 rounded-2xl shadow-lg p-4">
            <div class="flex flex-wrap gap-3 items-center justify-between mb-3">
                <div>
                    <h2 class="text-xl font-bold text-red-800">🔧 Администратор</h2>
                    <p class="text-sm text-red-600">Все задачи семьи · можно передать любое дело</p>
                </div>
                <div class="flex gap-2 flex-wrap items-center">
                    ${renderUserSwitcher("Администратор")}
                    <button id="showStats" class="bg-amber-100 text-amber-800 px-3 py-1 rounded-xl text-sm">📊 Статистика</button>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="resetSprintBtn" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-bold px-4 py-2 rounded-xl text-sm">📋 Задачи спринта</button>
                <span class="flex-1 text-center bg-white border border-red-200 text-red-700 font-bold px-4 py-2 rounded-xl text-sm">👥 Прогресс семьи</span>
            </div>
        </div>

        <div class="bg-white rounded-xl p-3 shadow-sm">
            <div class="flex justify-between text-xs text-gray-500 mb-1">
                <span>Прогресс семьи</span><span>${famDone}/${famTotal} задач</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-3">
                <div class="bg-green-500 h-3 rounded-full transition-all" style="width:${famPct}%"></div>
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-4">${memberSections}</div>
    </div>`;
}

// ─────────────────── РЕНДЕР: выполнение (обычный участник) ───────────────────
function renderExecution() {
    const user = state.currentUser;
    if (user === "Администратор") return renderAdminView();

    const myTasks  = state.tasks.filter(t => t.assignee === user);
    ensureTaskOrder(user, myTasks);
    const satTasksRaw = myTasks.filter(t => t.sprint === "sat" && !t.done);
    const sunTasksRaw = myTasks.filter(t => t.sprint === "sun" && !t.done);
    const satTasks = getSortedUserTasks(satTasksRaw, user);
    const sunTasks = getSortedUserTasks(sunTasksRaw, user);
    const done     = myTasks.filter(t => t.done);
    const totalLeft = [...satTasks, ...sunTasks].reduce((s,t)=>s+t.time,0);
    const pct      = myTasks.length ? Math.round(done.length / myTasks.length * 100) : 0;
    const isMisha  = user === "Миша";
    const isMama   = user === "Мама";
    const isAdmin  = user === "Администратор";

    // Лягушка — для всех участников
    const myFrogId = getFrogId(user);
    const frogTask = myFrogId ? myTasks.find(t => t.id === myFrogId && !t.done) : null;
    let frogBanner = "";
    if (frogTask) {
        frogBanner = `
        <div class="bg-lime-100 border-2 border-lime-400 rounded-2xl p-4 flex items-center gap-3">
            <span style="font-size:3rem;flex-shrink:0">🐸</span>
            <div>
                <p class="font-black text-lime-900" style="font-size:1.15rem">Съешь лягушку первой!</p>
                <p class="text-lime-800 font-semibold text-sm">${frogTask.name}</p>
                <p class="text-lime-600 text-xs">Сделай самое скучное — потом будет легче!</p>
            </div>
        </div>`;
    } else if (!myFrogId) {
        frogBanner = `
        <div class="bg-lime-50 border border-lime-200 rounded-2xl p-3 flex items-center gap-3">
            <span style="font-size:2rem;flex-shrink:0">🐸</span>
            <div>
                <p class="font-bold text-lime-800">Выбери лягушку!</p>
                <p class="text-lime-600 text-xs">Нажми 🐸 на задаче — начни с неё!</p>
            </div>
        </div>`;
    }

    const famDone  = state.tasks.filter(t=>t.done).length;
    const famTotal = state.tasks.length;
    const famPct   = famTotal ? Math.round(famDone/famTotal*100) : 0;

    return `
    <div class="space-y-4">
        <div class="bg-white rounded-2xl shadow-lg p-4 flex flex-wrap gap-3 items-center justify-between">
            <div>
                <h2 class="text-xl font-bold text-amber-800">Спринт — ${user}</h2>
                <p class="text-sm text-gray-500">${totalLeft} мин осталось · ${pct}% выполнено</p>
            </div>
            <div class="flex gap-2 flex-wrap items-center">
                ${isMisha ? `<div class="bg-yellow-100 text-yellow-800 px-3 py-1 rounded-full text-sm font-bold">⭐ ${state.mishaPoints} баллов</div>` : ""}
                ${state.sprintStreak > 1 ? `<div class="bg-orange-100 text-orange-700 px-3 py-1 rounded-full text-sm font-bold" title="Серия спринтов">🔥 ${state.sprintStreak} подряд</div>` : ""}
                ${renderUserSwitcher(user)}
                ${isMama ? `<button id="goAdmin" class="bg-red-100 text-red-700 px-3 py-1 rounded-xl text-sm font-semibold">🔧 Режим адм.</button>` : ""}
                <button id="openSyncModal" class="bg-sky-100 text-sky-700 px-3 py-1 rounded-xl text-sm" title="Синхронизация">${getSyncStatus() ? "🔄✅" : "🔄"}</button>
                <button id="showStats"    class="bg-amber-100 text-amber-800 px-3 py-1 rounded-xl text-sm">📊 Стат.</button>
                <button id="resetSprintBtn" class="bg-gray-100 text-gray-600 px-3 py-1 rounded-xl text-sm">↩ Пересобрать</button>
            </div>
        </div>

        <div class="bg-white rounded-xl p-3 shadow-sm">
            <div class="flex justify-between text-xs text-gray-500 mb-1">
                <span>Прогресс семьи</span><span>${famDone}/${famTotal} задач</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-3">
                <div class="bg-green-500 h-3 rounded-full transition-all" style="width:${famPct}%"></div>
            </div>
        </div>

        <div class="w-full bg-gray-100 rounded-full h-2">
            <div class="bg-amber-500 h-2 rounded-full" style="width:${pct}%"></div>
        </div>

        ${frogBanner}

        <div class="grid md:grid-cols-2 gap-4">
            <div>
                <div class="flex items-center justify-between mb-2">
                    <h3 class="font-bold text-blue-700">📅 Суббота (${satTasks.length})</h3>
                    ${!isAdmin ? `<button class="quickAddBtn text-xs text-blue-400 border border-dashed border-blue-200 rounded-lg px-2 py-1 tap44" data-sprint="sat" data-user="${user}">+ задача</button>` : ""}
                </div>
                ${satTasks.length ? satTasks.map((t,i)=>renderCard(t,user,i,satTasks.length)).join("") : `<p class="text-gray-400 text-sm">Нет задач</p>`}
            </div>
            <div>
                <div class="flex items-center justify-between mb-2">
                    <h3 class="font-bold text-purple-700">📅 Воскресенье (${sunTasks.length})</h3>
                    ${!isAdmin ? `<button class="quickAddBtn text-xs text-purple-400 border border-dashed border-purple-200 rounded-lg px-2 py-1 tap44" data-sprint="sun" data-user="${user}">+ задача</button>` : ""}
                </div>
                ${sunTasks.length ? sunTasks.map((t,i)=>renderCard(t,user,i,sunTasks.length)).join("") : `<p class="text-gray-400 text-sm">Нет задач</p>`}
                ${done.length ? `
                <details class="mt-3">
                    <summary class="text-sm text-gray-500 cursor-pointer">✅ Выполнено (${done.length})</summary>
                    <div class="mt-1 space-y-1">
                    ${done.map(t=>`
                        <div class="flex items-center gap-2 border-b py-1 group">
                            <span class="flex-1 text-sm line-through text-gray-400">${t.name}</span>
                            <span class="text-xs text-gray-300">⏱ ${t.time} мин</span>
                            <button class="undoBtn text-xs bg-yellow-100 text-yellow-700 px-2 py-1 rounded-lg" data-id="${t.id}">↩ Вернуть</button>
                        </div>`).join("")}
                    </div>
                </details>` : ""}
            </div>
        </div>

        ${(() => {
            const mySat = myTasks.filter(t => t.sprint === "sat");
            const mySun = myTasks.filter(t => t.sprint === "sun");
            const satDoneN = mySat.filter(t => t.done).length;
            const sunDoneN = mySun.filter(t => t.done).length;
            const satPct   = mySat.length ? Math.round(satDoneN/mySat.length*100) : 100;
            const sunPct   = mySun.length ? Math.round(sunDoneN/mySun.length*100) : 100;
            const allFamilySatDone = state.tasks.filter(t=>t.sprint==="sat").every(t=>t.done) && state.tasks.filter(t=>t.sprint==="sat").length > 0;
            return `
        <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 space-y-2">
            <p class="font-bold text-amber-800">🏆 Прогресс спринта</p>
            ${mySat.length ? `
            <div>
                <div class="flex justify-between text-xs text-gray-500 mb-1">
                    <span>📅 Суббота</span>
                    <span>${satDoneN}/${mySat.length} · ${satPct}%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2">
                    <div class="h-2 rounded-full transition-all ${satPct===100?"bg-green-500":"bg-amber-400"}" style="width:${satPct}%"></div>
                </div>
            </div>` : ""}
            ${mySun.length ? `
            <div>
                <div class="flex justify-between text-xs text-gray-500 mb-1">
                    <span>📅 Воскресенье</span>
                    <span>${sunDoneN}/${mySun.length} · ${sunPct}%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2">
                    <div class="h-2 rounded-full transition-all ${sunPct===100?"bg-green-500":"bg-purple-400"}" style="width:${sunPct}%"></div>
                </div>
            </div>` : ""}
            ${pct===100
                ? `<p class="text-green-700 font-semibold text-sm">✅ Всё выполнено! Выберите награду: 🍿 Фильм  🍦 Мороженое  🌲 Природа</p>`
                : allFamilySatDone && !isAdmin
                    ? `<p class="text-amber-700 text-sm font-semibold">🌅 Суббота завершена — осталось воскресенье!</p>`
                    : `<p class="text-gray-500 text-sm">Выполни все задачи — выбери награду для семьи</p>`}
        </div>`;
        })()}
    </div>`;
}

function renderCard(task, user, orderIdx, orderTotal) {
    const pref        = task.prefs?.[user] || 1;
    const isMisha     = user === "Миша";
    const canReassign = (user === "Мама" || user === "Администратор");
    const isFrog      = task.id === getFrogId(user);
    const isAdmin     = user === "Администратор";

    const badges = [];
    if (isFrog)              badges.push(`<span class="text-xs bg-lime-300 text-lime-900 px-1.5 py-0.5 rounded-full font-bold">🐸 ЛЯГУШКА</span>`);

    if (task.isPersonal)     badges.push(`<span class="text-xs bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded-full">👤 Личное</span>`);
    if (task.isMishaSubtask) badges.push(`<span class="text-xs bg-teal-100 text-teal-700 px-1.5 py-0.5 rounded-full">🧩 Подзадача</span>`);

// ─────────────────── ПОМИДОР (таймер для всех) ───────────────────
function showPomodoroTimer(task, user) {
    user = user || state.currentUser;
    const totalSecs = task.time * 60;
    let remaining   = totalSecs;
    let paused      = false;
    let iv          = null;
    const pts       = task.time * 2;
    const R         = 80;
    const CIRC      = Math.round(2 * Math.PI * R); // ~502

    const modal = document.createElement("div");
    modal.className = "fixed inset-0 flex flex-col items-center justify-center z-50 p-4 select-none";
    modal.style.background = "linear-gradient(135deg,#7c2d12,#c2410c)";
    document.body.appendChild(modal);

    function fmt(s) {
        return Math.floor(s/60) + ":" + String(s%60).padStart(2,"0");
    }
    function phase() {
        const pct = remaining / totalSecs;
        if (pct > 0.7) return { e:"🍅", msg:"Поехали!",    clr:"#f97316" };
        if (pct > 0.4) return { e:"💪", msg:"Ты крутой!",  clr:"#ef4444" };
        if (pct > 0.1) return { e:"🔥", msg:"Почти!",      clr:"#dc2626" };
        return               { e:"⭐", msg:"Давай!!",      clr:"#7c3aed" };
    }

    function draw() {
        const p   = phase();
        const off = Math.round(CIRC * (1 - remaining / totalSecs));
        modal.innerHTML = `
        <div class="text-center w-full max-w-xs">
            <p class="text-white/60 text-sm mb-3 tracking-wide">${task.name}</p>
            <div class="relative inline-flex items-center justify-center mb-4">
                <svg width="200" height="200" style="transform:rotate(-90deg)">
                    <circle cx="100" cy="100" r="${R}" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="14"/>
                    <circle cx="100" cy="100" r="${R}" fill="none" stroke="${p.clr}" stroke-width="14"
                            stroke-dasharray="${CIRC}" stroke-dashoffset="${off}" stroke-linecap="round"
                            style="transition:stroke-dashoffset .9s linear,stroke .4s"/>
                </svg>
                <div class="absolute flex flex-col items-center">
                    <span style="font-size:3rem;line-height:1.1">${p.e}</span>
                    <span class="text-white font-black" style="font-size:2.8rem;font-variant-numeric:tabular-nums;line-height:1">${fmt(remaining)}</span>
                </div>
            </div>
            <p class="text-white font-black mb-6" style="font-size:1.8rem">${p.msg}</p>
            <div class="flex gap-3 justify-center">
                <button id="pmPause" class="text-white font-black text-lg px-6 py-3 rounded-2xl" style="background:rgba(255,255,255,.2)">${paused ? "▶ Старт" : "⏸ Пауза"}</button>
                <button id="pmStop"  class="text-white font-black text-lg px-6 py-3 rounded-2xl" style="background:rgba(255,255,255,.2)">✖ Стоп</button>
            </div>
        </div>`;
        modal.querySelector("#pmPause").onclick = () => {
            paused = !paused;
            if (paused) { clearInterval(iv); iv = null; } else { tick(); }
            draw();
        };
        modal.querySelector("#pmStop").onclick = () => { clearInterval(iv); modal.remove(); };
    }

    function done() {
        clearInterval(iv);
        const isFrog  = task.id === getFrogId(user);
        const bonus   = (user === "Миша" && isFrog) ? pts : 0;
        const isMisha = user === "Миша";
        modal.innerHTML = `
        <div class="text-center">
            <div style="font-size:5.5rem;margin-bottom:.3rem">${isFrog ? "🐸" : "🎉"}</div>
            <p class="text-white font-black mb-1" style="font-size:2.8rem">${isFrog ? "ЛЯГУШКА СЪЕДЕНА!" : "ГОТОВО!"}</p>
            <p class="font-black mb-8" style="font-size:2rem;color:#fde047">
                ${isMisha
                    ? `+${pts + bonus} ⭐${isFrog ? " (x2 за лягушку!)" : ""}`
                    : `${task.time} мин — выполнено! 💪`}
            </p>
            <button id="pmDone" class="font-black text-yellow-900 text-xl px-10 py-4 rounded-2xl" style="background:#fde047">
                ${isMisha ? "Забрать звёзды!" : "Ура! 🎊"}
            </button>
        </div>`;
        showConfetti();
        modal.querySelector("#pmDone").onclick = () => {
            const t = state.tasks.find(x => x.id === task.id);
            if (t && !t.done) {
                t.done = true;
                if (isMisha) {
                    state.mishaPoints += pts + bonus;
                    state.logsMisha.push({ date:new Date().toISOString(), reason:`🍅 ${t.name}`, pts: pts + bonus });
                }
                saveState();
            }
            modal.remove();
            render();
        };
    }

    function tick() {
        iv = setInterval(() => {
            if (paused) return;
            remaining--;
            if (remaining <= 0) { remaining = 0; draw(); done(); }
            else draw();
        }, 1000);
    }

    draw();
    tick();
}

// ─────────────────── КЛЮЧ НЕДЕЛИ ───────────────────
function getWeekKey() {
    const d   = new Date();
    const jan = new Date(d.getFullYear(), 0, 1);
    const week = Math.ceil(((d - jan) / 86400000 + jan.getDay() + 1) / 7);
    return `${d.getFullYear()}-W${week}`;
}

function getFrogId(user)       { return (state.frogTaskIds || {})[user] || null; }
function setFrogId(user, id)   {
    if (!state.frogTaskIds) state.frogTaskIds = {};

    if (user === "Миша") state.mishaFrogTaskId = id; // backward compat

// ─────────────────── ПОРЯДОК ЗАДАЧ: хелперы ───────────────────
function ensureTaskOrder(user, tasks) {
    if (!state.taskOrder) state.taskOrder = {};
    const cur     = state.taskOrder[user] || [];
    const ids     = tasks.map(t => t.id);
    const newIds  = ids.filter(id => !cur.includes(id));
    const cleaned = cur.filter(id => ids.includes(id));
    if (newIds.length || cleaned.length !== cur.length) {
        state.taskOrder[user] = [...cleaned, ...newIds];
        saveState();
    }
}
function getSortedUserTasks(tasks, user) {
    const order = (state.taskOrder || {})[user];
    if (!order || !order.length) return tasks;
    return [...tasks].sort((a, b) => {
        const ia = order.indexOf(a.id), ib = order.indexOf(b.id);
        if (ia === -1 && ib === -1) return 0;
        if (ia === -1) return 1;
        if (ib === -1) return -1;
        return ia - ib;
    });
}
function moveTaskOrder(user, taskId, dir) {   // dir: -1 вверх, +1 вниз
    if (!state.taskOrder) state.taskOrder = {};
    const order = state.taskOrder[user] || [];
    const idx   = order.indexOf(taskId);
    if (idx === -1) return;
    const swap  = idx + dir;
    if (swap < 0 || swap >= order.length) return;
    [order[idx], order[swap]] = [order[swap], order[idx]];
    state.taskOrder[user] = order;
    saveState();
    render();
}

        `🚀 Семья уже на ${famPct}% — продолжаем!`,
    ];
    const msg = msgs[famDone % msgs.length];

    const toast = document.createElement("div");
    toast.className = "fixed bottom-24 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-2xl shadow-xl text-white font-bold text-sm text-center max-w-xs pointer-events-none";
    toast.style.background = "linear-gradient(135deg,#10b981,#059669)";
    toast.innerHTML = `${msg}<br><span class="font-normal text-xs opacity-80">${famDone} из ${famTotal} дел закрыто</span>`;
    document.body.appendChild(toast);
    setTimeout(() => {
        toast.style.transition = "opacity .5s";
        toast.style.opacity    = "0";
        setTimeout(() => toast.remove(), 500);
    }, 2700);
}

function showUserCompleteModal(user) {
    const emojis  = { Миша:"👦", Максим:"🧑", Майя:"👧", Мама:"👩" };
    const colors  = { Миша:"blue", Максим:"purple", Майя:"pink", Мама:"amber" };

    // Кто уже закончил, кто ещё нет
    const rows = MEMBERS.map(m => {
        const mTasks = state.tasks.filter(t => t.assignee === m);
        if (!mTasks.length) return null;
        const done = mTasks.every(t => t.done);
        const left = mTasks.filter(t => !t.done).length;
        return { m, done, left };
    }).filter(Boolean);

    const doneCount   = rows.filter(r => r.done).length;
    const totalCount  = rows.length;
    const allDone     = doneCount === totalCount;

    const progressRows = rows.map(r => `
        <div class="flex items-center gap-3 py-2 border-b last:border-0">
            <span class="text-xl">${emojis[r.m] || "👤"}</span>

    const hasPending = !!state.pendingReward;

    const modal = document.createElement("div");
    modal.className = "fixed inset-0 bg-black bg-opacity-60 bs-wrap flex items-center justify-center z-50 p-4";
    modal.innerHTML = `
    <div class="bg-white rounded-3xl shadow-2xl p-6 w-full max-w-sm bs-card">

        <div class="bg-gray-50 rounded-2xl px-4 py-1 mb-4 divide-y divide-gray-100">

        </div>` : `
        <div class="bg-amber-50 border border-amber-200 rounded-2xl p-3 mb-4 text-center">
            <p class="text-xs text-amber-700">⏳ Твоё предложение «<strong>${state.pendingReward.text}</strong>» ждёт одобрения администратора</p>
        </div>`}

        <button id="closeUserComplete" class="w-full bg-amber-600 hover:bg-amber-700 text-white py-3 rounded-xl font-bold">Отлично!</button>
    </div>`;
    document.body.appendChild(modal);

    const input = modal.querySelector("#rewardSuggestInput");
    const suggestBtn = modal.querySelector("#rewardSuggestBtn");
    if (suggestBtn) {

            if (!text) { input?.classList.add("ring-2","ring-red-400"); input?.focus(); return; }

    }
    modal.querySelector("#closeUserComplete").onclick = () => modal.remove();
    modal.addEventListener("click", e => { if (e.target === modal) modal.remove(); });
}

function generateAchievementCard(streak, today) {
    const W = 600, H = 320;
    const canvas = document.createElement("canvas");
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext("2d");

    // Фон градиент
    const grad = ctx.createLinearGradient(0, 0, W, H);
    grad.addColorStop(0, "#7c3aed");
    grad.addColorStop(1, "#db2777");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(0, 0, W, H, 24) : ctx.rect(0, 0, W, H);
    ctx.fill();

    // Полупрозрачная полоса снизу
    ctx.fillStyle = "rgba(0,0,0,.15)";
    ctx.fillRect(0, H - 60, W, 60);

    // Эмодзи
    ctx.font = "56px serif";
    ctx.fillText("🏠", 36, 90);
    ctx.fillText("🎉", W - 90, 90);

    // Подзаголовок
    ctx.fillStyle = "rgba(255,255,255,.65)";
    ctx.font = "600 18px system-ui,sans-serif";
    ctx.fillText("Семья Б-27 · Семейный спринт", 36, 145);

    // Главный текст
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 52px system-ui,sans-serif";
    ctx.fillText("100% выполнено!", 36, 210);

    // Серия
    if (streak > 1) {
        ctx.fillStyle = "#fde047";
        ctx.font = "bold 24px system-ui,sans-serif";
        ctx.fillText(`🔥 Серия: ${streak} недели подряд`, 36, 254);
    }

    // Дата
    ctx.fillStyle = "rgba(255,255,255,.45)";
    ctx.font = "16px system-ui,sans-serif";
    ctx.fillText(today, 36, H - 20);

    // Скачать
    const a = document.createElement("a");
    a.download = `b27-sprint-100-${Date.now()}.png`;
    a.href = canvas.toDataURL("image/png");
    a.click();
}

// ─────────────────── 🐘 МОДАЛКА СЛОН: декомпозиция ───────────────────
function showElephantModal(task) {
    // Filter out steps already added as subtasks
    const existingNames = new Set((task.customSubtasks || []).map(s => s.name.toLowerCase().trim()));
    const allSteps = elephantStepsFor(task);
    const steps = allSteps.filter(s => !existingNames.has(s.name.toLowerCase().trim()));

    const modal = document.createElement("div");
    modal.className = "fixed inset-0 bg-black bg-opacity-60 bs-wrap flex items-start justify-center z-50 p-4 overflow-auto";

    const stepsHtml = steps.length
        ? steps.map((s,i) => `
            <label class="flex items-start gap-3 p-3 border-2 border-gray-100 rounded-xl hover:border-amber-300 cursor-pointer transition-all has-[:checked]:border-amber-400 has-[:checked]:bg-amber-50">
                <input type="checkbox" class="elephantCheck w-4 h-4 mt-0.5 flex-shrink-0 accent-amber-500" data-idx="${i}" checked>
                <div class="flex-1">
                    <p class="text-sm font-medium text-gray-800">${s.name}</p>
                    <p class="text-xs text-gray-400 mt-0.5">~${s.time} мин</p>
                </div>
            </label>`).join("")
        : `<div class="text-center py-6">
            <span class="text-4xl">✅</span>
            <p class="text-gray-600 font-semibold mt-2">Все шаги уже добавлены!</p>
            <p class="text-xs text-gray-400 mt-1">Задача полностью разбита на подзадачи</p>
           </div>`;

    modal.innerHTML = `
    <div class="bg-white rounded-3xl shadow-2xl p-6 w-full max-w-sm mt-8 mb-8 bs-card">
        <div class="flex justify-between items-start mb-2">
            <div>
                <h3 class="text-xl font-black text-gray-800">🐘 Разбить на кусочки</h3>
                <p class="text-xs text-gray-400 mt-0.5">Каждый кусочек — 2–10 минут («дыры в сыре»)</p>
            </div>
            <button id="closeElephant" class="text-gray-300 hover:text-gray-500 text-2xl leading-none ml-3 flex-shrink-0">×</button>
        </div>
        <p class="text-sm text-gray-500 mb-4">«${task.name}» — выбери шаги, которые хочешь добавить:</p>
        <div class="space-y-2 mb-5" id="elephantStepsList">
            ${stepsHtml}
        </div>
        <div class="flex gap-3">
            ${steps.length
                ? `<button id="confirmElephant" class="flex-1 bg-amber-600 hover:bg-amber-700 text-white py-3 rounded-xl font-bold">🐘 Добавить шаги</button>`
                : ""}
            <button id="cancelElephant"  class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-3 rounded-xl">${steps.length ? "Отмена" : "Закрыть"}</button>
        </div>
    </div>`;
    document.body.appendChild(modal);

    const confirmBtn = modal.querySelector("#confirmElephant");
    if (confirmBtn) confirmBtn.onclick = () => {
        const checked = [...modal.querySelectorAll(".elephantCheck:checked")]
            .map(cb => steps[+cb.dataset.idx]);
        if (!checked.length) { modal.remove(); return; }
        if (!task.customSubtasks) task.customSubtasks = [];
        checked.forEach(s => {
            task.customSubtasks.push({
                id: `sub_${Date.now()}_${Math.random().toString(36).slice(2,6)}`,
                name: s.name,
                done: false
            });
        });
        saveState(); render(); modal.remove();
    };
    modal.querySelector("#cancelElephant").onclick  = () => modal.remove();
    modal.querySelector("#closeElephant").onclick   = () => modal.remove();
    modal.addEventListener("click", e => { if(e.target === modal) modal.remove(); });
}

                        <option value="once">🗓 Разово</option>
                        <option value="weekly">Каждую неделю</option>
                        <option value="biweekly">Раз в 2 недели</option>
                        <option value="monthly">Раз в месяц</option>
                    </select>
                </div>
            </div>

            <!-- БЛОК: разово — конкретный исполнитель -->
            <div id="blockAssignee">
                <label class="block text-sm font-semibold text-gray-700 mb-1">Исполнитель</label>
                <div class="grid grid-cols-2 gap-2">
                    ${MEMBERS.map((m, i) => `
                        <label class="flex items-center gap-2 border-2 rounded-xl px-3 py-2 cursor-pointer transition-all hover:border-amber-400 has-[:checked]:border-amber-500 has-[:checked]:bg-amber-50">
                            <input type="radio" name="newTaskAssignee" value="${m}" class="w-4 h-4 accent-amber-500" ${i===0?"checked":""}>
                            <span class="text-sm font-medium">${m}</span>
                        </label>`).join("")}
                </div>
            </div>

            <!-- БЛОК: повторяющаяся — группа + тип -->
            <div id="blockRecurring" style="display:none" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Кто может выполнять</label>
                    <div class="flex gap-3 flex-wrap">
                        ${MEMBERS.map(m => `
                            <label class="flex items-center gap-1 cursor-pointer select-none">
                                <input type="checkbox" class="newTaskWho w-4 h-4" value="${m}" checked>
                                <span class="text-sm">${m}</span>
                            </label>`).join("")}
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Тип распределения</label>
                    <select id="newTaskType" class="w-full border rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
                        <option value="shared">Распределяемая — кто-то один</option>
                        <option value="personal">Личная — каждый делает своё</option>
                        <option value="adhd">Задача Миши (короткие шаги)</option>
                        <option value="mom_primary">Задача Мамы</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Заметка (необязательно)</label>
                <input id="newTaskNote" type="text" placeholder="Уточнение или комментарий" class="w-full border rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400">
            </div>
        </div>
        <div class="flex gap-3 mt-6">
            <button id="confirmAddTask" class="flex-1 bg-amber-600 hover:bg-amber-700 text-white px-4 py-3 rounded-xl font-bold">Добавить задачу</button>
            <button id="cancelAddTask"  class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-3 rounded-xl">Отмена</button>
        </div>
    </div>`;
    document.body.appendChild(modal);

    const close = () => modal.remove();
    modal.querySelector("#closeAddTask").onclick = close;
    modal.querySelector("#cancelAddTask").onclick = close;
    modal.addEventListener("click", e => { if(e.target === modal) close(); });

    // Переключение блоков при смене периодичности
    modal.querySelector("#newTaskFreq").onchange = e => {
        const isOnce = e.target.value === "once";
        modal.querySelector("#blockAssignee").style.display  = isOnce ? "block" : "none";
        modal.querySelector("#blockRecurring").style.display = isOnce ? "none"  : "block";
    };

    modal.querySelector("#confirmAddTask").onclick = () => {
        const nameEl = modal.querySelector("#newTaskName");
        const name   = nameEl.value.trim();
        if (!name) { nameEl.focus(); nameEl.classList.add("border-red-400"); return; }

        const time = parseInt(modal.querySelector("#newTaskTime").value) || 15;
        const freq = modal.querySelector("#newTaskFreq").value;
        const note = modal.querySelector("#newTaskNote").value.trim() || undefined;

        let type, who;
        if (freq === "once") {
            // Конкретный исполнитель — задача уходит ему напрямую
            const assignee = modal.querySelector("input[name='newTaskAssignee']:checked")?.value || MEMBERS[0];
            type = "shared";          // shared с одним в who → всегда ему
            who  = [assignee];
        } else {
            type = modal.querySelector("#newTaskType").value;
            who  = [...modal.querySelectorAll(".newTaskWho:checked")].map(c => c.value);
            if (!who.length) { alert("Выбери хотя бы одного участника"); return; }
        }

        const newTask = {
            id: "custom_" + Date.now(),
            name, type, category: "Свои задачи", freq, time, who, note,
            isCustom: true,
            prefs: Object.fromEntries(MEMBERS.map(m => [m, who.includes(m) ? 8 : 2])),
        };
        if (!state.customTasks) state.customTasks = [];
        state.customTasks.push(newTask);
        state.allTasksPool.push(JSON.parse(JSON.stringify(newTask)));
        state.selectedSprintTaskIds.add(newTask.id);
        saveState();
        close();
        render();

        const toast = document.createElement("div");
        toast.className = "fixed bottom-6 left-1/2 -translate-x-1/2 bg-green-600 text-white text-sm px-5 py-2.5 rounded-xl z-50 shadow-lg font-semibold";
        toast.textContent = freq === "once"
            ? `✅ «${name}» → ${who[0]}`
            : `✅ «${name}» добавлено`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    };
}

// ─────────────────── КОНФЕТТИ ───────────────────
function showConfetti() {
    for (let i=0; i<120; i++) {
        const c = document.createElement("div");
        c.className = "confetti-piece";
        c.style.left = Math.random() * window.innerWidth + "px";
        c.style.top  = "-10px";
        c.style.backgroundColor = `hsl(${Math.random()*360},70%,60%)`;
        document.body.appendChild(c);
        setTimeout(()=>c.remove(), 2200);
    }
}

// ─────────────────── СОБЫТИЯ ───────────────────
function attachEvents() {
    // --- Admin: выбор задач ---
    document.querySelectorAll(".task-checkbox").forEach(cb => {
        cb.onchange = () => {
            if (cb.checked) state.selectedSprintTaskIds.add(cb.dataset.id);
            else            state.selectedSprintTaskIds.delete(cb.dataset.id);
            saveState(); render();
        };
    });

    const presetEasy = document.getElementById("presetEasy");
    if (presetEasy) presetEasy.onclick = () => {
        // Лёгкий: только личные (каждый за себя) + СДВГ-задачи Миши
        state.selectedSprintTaskIds = new Set(
            state.allTasksPool.filter(t => t.type === "personal" || t.type === "adhd").map(t => t.id)
        );
        saveState(); render();
    };
    const presetNormal = document.getElementById("presetNormal");
    if (presetNormal) presetNormal.onclick = () => {
        // Обычный: все еженедельные задачи + текущая ротация двухнедельных
        const biIds = currentBiweeklyIds();
        state.selectedSprintTaskIds = new Set(
            state.allTasksPool.filter(t => {
                if (t.freq === "monthly")  return false;
                if (t.freq === "biweekly") return biIds.includes(t.id);
                return true; // все weekly любого типа
            }).map(t => t.id)
        );
        saveState(); render();
    };
    const presetFull = document.getElementById("presetFull");
    if (presetFull) presetFull.onclick = () => {
        // Генеральная: все задачи из базы
        state.selectedSprintTaskIds = new Set(state.allTasksPool.map(t => t.id));
        saveState(); render();
    };

    const distBtn = document.getElementById("distributeBtn");
    if (distBtn) distBtn.onclick = () => {
        if (state.selectedSprintTaskIds.size === 0) return;
        const sel = state.allTasksPool.filter(t => state.selectedSprintTaskIds.has(t.id));
        state.tasks  = assignBalanced(sel);
        state.stage  = "execution";
        saveState(); render();
    };

    // --- Execution ---
    const switcher = document.getElementById("userSwitcher");
    if (switcher) switcher.onchange = e => {
        state.currentUser = e.target.value; saveState(); render();
    };
    const resetBtn = document.getElementById("resetSprintBtn");
    if (resetBtn) resetBtn.onclick = () => {
        state.stage = "sprint_selection";
        state.currentUser = "Администратор";
        state.last100PercentDate = null;
        state.lastSat100Date     = null;
        state.userCompletedDates = {};
        saveState(); render();
    };
    const showStats = document.getElementById("showStats");
    if (showStats) showStats.onclick = () => renderStatsModal();

    // Чекбоксы выполнения
    document.querySelectorAll(".doneCheck").forEach(cb => {
        cb.onchange = () => {
            const task = state.tasks.find(t => t.id === cb.dataset.id);
            if (!task || task.done) return;
            task.done = true;
            if (state.currentUser === "Миша") {
                state.mishaPoints += task.time * 2;
                state.logsMisha.push({ date:new Date().toISOString(), reason:`Выполнил: ${task.name}`, pts:task.time*2 });
            }
            showContributionToast(task, state.currentUser);
            saveState();

            // Проверка: текущий участник закончил свою часть?
            const cu = state.currentUser;
            if (cu !== "Администратор") {
                const myAll = state.tasks.filter(t => t.assignee === cu);
                const myAllDone = myAll.length > 0 && myAll.every(t => t.done);
                if (myAllDone && !state.userCompletedDates?.[cu] && !state.tasks.every(t=>t.done)) {
                    if (!state.userCompletedDates) state.userCompletedDates = {};
                    state.userCompletedDates[cu] = new Date().toISOString();
                    saveState();
                    showConfetti();
                    setTimeout(() => showUserCompleteModal(cu), 400);
                    render();
                    return; // не запускаем субботний / общий триггер одновременно
                }
            }

            // Проверка: все субботние задачи выполнены?
            const satTasks   = state.tasks.filter(t => t.sprint === "sat");
            const sunTasks   = state.tasks.filter(t => t.sprint === "sun");
            const satAllDone = satTasks.length > 0 && satTasks.every(t => t.done);
            const allDone    = state.tasks.every(t => t.done);

            if (satAllDone && !state.lastSat100Date) {
                state.lastSat100Date = new Date().toISOString();
                // Серия спринтов — считаем по субботе (основное событие)
                const weekKey = getWeekKey();
                if (state.lastSprintWeek !== weekKey) {
                    state.sprintStreak = (state.sprintStreak || 0) + 1;
                    state.lastSprintWeek = weekKey;
                }
                saveState();
                showConfetti();
                if (sunTasks.length > 0 && !allDone) {
                    // Есть воскресные дела — суббота это главный праздник с наградой
                    setTimeout(() => showRewardModal(), 400);
                } else {
                    // Нет воскресных или всё выполнено сразу — полный праздник
                    state.last100PercentDate = new Date().toISOString();
                    saveState();
                    setTimeout(() => showRewardModal(), 400);
                }
            }

            // Проверка: вся семья на 100% (включая воскресные дела)?
            if (allDone && !state.last100PercentDate) {
                state.last100PercentDate = new Date().toISOString();
                saveState();
                showConfetti();
                // Суббота уже была отпразднована — показываем мини-карточку финала
                setTimeout(() => showSundayCompleteModal(), 400);
            }
            render();
        };
    });

    // Отложить на воскресенье
    document.querySelectorAll(".deferBtn").forEach(btn => {
        btn.onclick = () => {
            const task = state.tasks.find(t => t.id === btn.dataset.id);
            if (task && task.sprint === "sat") { task.sprint = "sun"; saveState(); render(); }
        };
    });

    // Вернуть с воскресенья на субботу
    document.querySelectorAll(".undeferBtn").forEach(btn => {
        btn.onclick = () => {
            const task = state.tasks.find(t => t.id === btn.dataset.id);
            if (task && task.sprint === "sun") { task.sprint = "sat"; saveState(); render(); }
        };
    });

    // ▶ / ⏸ Статус «В работе»
    document.querySelectorAll(".inProgressBtn").forEach(btn => {
        btn.onclick = () => {
            const task = state.tasks.find(t => t.id === btn.dataset.id);
            if (!task) return;
            task.inProgress = !task.inProgress;
            saveState(); render();
            showToast(task.inProgress ? "▶ Задача в работе!" : "⏸ Задача на паузе");
        };
    });

    // ➕ Быстрое добавление задачи в спринт
    document.querySelectorAll(".quickAddBtn").forEach(btn => {
        btn.onclick = () => showQuickAddToSprintModal(btn.dataset.user, btn.dataset.sprint);
    });

    // ⇒ Передать подзадачу как задачу другому участнику
    document.querySelectorAll(".transferSubBtn").forEach(btn => {
        btn.onclick = () => showSubtaskTransferModal(btn.dataset.taskId, btn.dataset.subId);
    });

    // 🔄 Синхронизация
    document.querySelectorAll("#openSyncModal").forEach(btn => {
        btn.onclick = () => showSyncModal();
    });

    // 💡 Ожидающая награда (кнопка у администратора)
    const pendingRewardBtn = document.getElementById("showPendingRewardBtn");
    if (pendingRewardBtn) pendingRewardBtn.onclick = () => showRewardModal();

    // 🗑 Удалить задачу из спринта (только администратор)
    document.querySelectorAll(".deleteFromSprintBtn").forEach(btn => {
        btn.onclick = e => {
            e.stopPropagation();
            const id   = btn.dataset.id;
            const task = state.tasks.find(t => t.id === id);
            if (!task) return;
            if (!confirm(`Удалить «${task.name}» из спринта?`)) return;
            state.tasks = state.tasks.filter(t => t.id !== id);
            // Убираем базовый ID из выбора, чтобы не попал в следующий спринт
            const baseId = id.replace(/_Миша$|_Максим$|_Майя$|_Мама$|_helper$|_sub$/, "");
            state.selectedSprintTaskIds.delete(id);
            state.selectedSprintTaskIds.delete(baseId);
            saveState(); render();
            showToast(`🗑 «${task.name}» удалена из спринта`);
        };
    });

    // Помидор — для всех участников
    document.querySelectorAll(".timerBtn").forEach(btn => {
        btn.onclick = () => {
            const task = state.tasks.find(t => t.id === btn.dataset.id);
            if (task) showPomodoroTimer(task, state.currentUser);
        };
    });

    // Лягушка — для всех участников
    document.querySelectorAll(".frogBtn").forEach(btn => {
        btn.onclick = () => {
            const id   = btn.dataset.id;
            const user = state.currentUser;
            setFrogId(user, getFrogId(user) === id ? null : id);
            saveState(); render();
        };
    });

    // Порядок задач ↑↓
    document.querySelectorAll(".orderUpBtn").forEach(btn => {
        btn.onclick = () => moveTaskOrder(state.currentUser, btn.dataset.id, -1);
    });
    document.querySelectorAll(".orderDownBtn").forEach(btn => {
        btn.onclick = () => moveTaskOrder(state.currentUser, btn.dataset.id, +1);
    });

    // Режим администратора
    const goAdmin = document.getElementById("goAdmin");
    if (goAdmin) goAdmin.onclick = () => {
        state.currentUser = "Администратор"; saveState(); render();
    };
    const goAdminPlan = document.getElementById("goAdminPlan");
    if (goAdminPlan) goAdminPlan.onclick = () => {
        state.currentUser = "Администратор"; saveState(); render();
    };
    const goProgress = document.getElementById("goProgress");
    if (goProgress) goProgress.onclick = () => {
        state.stage = "execution"; saveState(); render();
    };

    // Передать дело
    document.querySelectorAll(".reassignBtn").forEach(btn => {
        btn.onclick = () => showReassignModal(btn.dataset.id);
    });

    // Вернуть выполненное дело
    document.querySelectorAll(".undoBtn").forEach(btn => {
        btn.onclick = () => {
            const task = state.tasks.find(t => t.id === btn.dataset.id);
            if (!task || !task.done) return;
            task.done = false;
            // Откатить баллы Миши если он выполнял
            if (task.assignee === "Миша") {
                state.mishaPoints = Math.max(0, state.mishaPoints - task.time * 2);
            }
            state.last100PercentDate = null;
            if (task.sprint === "sat") state.lastSat100Date = null;
            saveState(); render();
            const toast = document.createElement("div");
            toast.className = "fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-sm px-4 py-2 rounded-xl z-50 shadow-lg";
            toast.textContent = `«${task.name}» возвращено в список`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        };
    });

    // Дышилка
    document.querySelectorAll(".hardBtn").forEach(btn => {
        btn.onclick = () => {
            const t = state.tasks.find(x => x.id === btn.dataset.id);
            showHardModal(t || null);
        };
    });

    // 🐘 Слон — декомпозиция задачи
    document.querySelectorAll(".elephantBtn").forEach(btn => {
        btn.onclick = () => {
            const t = state.tasks.find(x => x.id === btn.dataset.id);
            if (t) showElephantModal(t);
        };
    });

    // ── Подзадачи ──────────────────────────────────────────
    document.querySelectorAll(".toggleSubInput").forEach(btn => {
        btn.onclick = () => {
            const inp = document.getElementById(`subInput_${btn.dataset.taskId}`);
            if (!inp) return;
            const open = inp.style.display !== "none";
            inp.style.display = open ? "none" : "flex";
            if (!open) inp.querySelector("input")?.focus();
        };
    });

    document.querySelectorAll(".confirmSubtask").forEach(btn => {
        btn.onclick = () => {
            const taskId = btn.dataset.taskId;
            const input  = document.querySelector(`.newSubtaskInput[data-task-id="${taskId}"]`);
            if (!input || !input.value.trim()) return;
            const task = state.tasks.find(t => t.id === taskId);
            if (!task) return;
            if (!task.customSubtasks) task.customSubtasks = [];
            task.customSubtasks.push({ id:`sub_${Date.now()}`, name:input.value.trim(), done:false });
            saveState(); render();
        };
    });

    // Enter в поле подзадачи
    document.querySelectorAll(".newSubtaskInput").forEach(inp => {
        inp.onkeydown = e => {
            if (e.key !== "Enter") return;
            const btn = document.querySelector(`.confirmSubtask[data-task-id="${inp.dataset.taskId}"]`);
            btn?.click();
        };
    });

    document.querySelectorAll(".subtaskCheck").forEach(cb => {
        cb.onchange = () => {
            const task = state.tasks.find(t => t.id === cb.dataset.taskId);
            if (!task) return;
            const sub = (task.customSubtasks||[]).find(s => s.id === cb.dataset.subId);
            if (sub) { sub.done = cb.checked; saveState(); render(); }
        };
    });

    document.querySelectorAll(".deleteSubtask").forEach(btn => {
        btn.onclick = e => {
            e.preventDefault();
            const task = state.tasks.find(t => t.id === btn.dataset.taskId);
            if (!task) return;
            task.customSubtasks = (task.customSubtasks||[]).filter(s => s.id !== btn.dataset.subId);
            saveState(); render();
        };
    });

    // ── Добавить свою задачу (админ) ──────────────────────
    const addCustomTaskBtn = document.getElementById("addCustomTaskBtn");
    if (addCustomTaskBtn) addCustomTaskBtn.onclick = () => showAddTaskModal();

    // ── Удалить свою задачу (админ) ───────────────────────
    document.querySelectorAll(".deleteCustomTask").forEach(btn => {
        btn.onclick = e => {
            e.preventDefault();
            const id = btn.dataset.id;
            state.customTasks = (state.customTasks||[]).filter(t => t.id !== id);
            state.allTasksPool = state.allTasksPool.filter(t => t.id !== id);
            state.selectedSprintTaskIds.delete(id);
            saveState(); render();
        };
    });
}

    const cfg        = getSyncConfig();
